AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM Template for Multi-Lambda with case-sensitive handler fix

Globals:
  Function:
    Runtime: python3.11
    # Matches your filename 'Lambda_function.py'
    Handler: Lambda_function.lambda_handler 
    Timeout: 30

Resources:
  UserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ojt-user-management-dev
      CodeUri: user_management/

  CompanyFunction:
    Type: AWS::Serverless::Function 
    Properties:
      FunctionName: ojt-company-management-dev
      CodeUri: company_management/

  OrganizationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ojt-organization-management-dev
      CodeUri: organization_management/

  PromptFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ojt-prompt-management-dev
      CodeUri: prompt_management/

  ConversionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ojt-conversion-management-dev
      CodeUri: conversion_management/
   
  
