version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ojt_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 254000
      POSTGRES_DB: local_dev_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: